services:
  ayan:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://ayan:ayan@postgres:5432/ayan?sslmode=disable
      - ANTHROPIC_KEY=${ANTHROPIC_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
    volumes:
      - ../ayan.yaml:/app/ayan.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ayan
      POSTGRES_PASSWORD: ayan
      POSTGRES_DB: ayan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
