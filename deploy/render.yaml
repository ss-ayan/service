services:
  - type: web
    name: ayan-service
    env: docker
    dockerfilePath: ./deploy/Dockerfile
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ayan-db
          property: connectionString
      - key: ANTHROPIC_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false

databases:
  - name: ayan-db
    databaseName: ayan
    user: ayan
    plan: starter
